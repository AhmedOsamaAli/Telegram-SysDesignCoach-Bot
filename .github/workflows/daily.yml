name: Daily System Design Bot

on:
  schedule:
    # GitHub Actions cron is in UTC. Two entries cover Egypt DST so it lands at 9 AM Cairo.
    - cron: "0 6 * * *" # 09:00 Cairo during summer (EEST, UTC+3)
    - cron: "0 7 * * *" # 09:00 Cairo during winter (EET, UTC+2)
  workflow_dispatch: # lets you run it manually from the Actions tab (always sends)

permissions:
  contents: write

concurrency:
  group: daily-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily article + quiz
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python bot.py

      - name: Persist sent history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json
          git commit -m "chore: update sent articles [skip ci]" || echo "Nothing to commit"
          git push || echo "Nothing to push"
